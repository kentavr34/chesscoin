<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ChessCoin · Mini App</title>
<link rel="icon" href="./assets/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #07070B; color: #F4F0E8; font-family: 'Inter', sans-serif; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }

  /* Phone bezel — keeps the design locked at a phone-sized surface on any viewport */
  .phone {
    width: 375px; height: 667px; max-width: 100%;
    max-height: calc(100vh - 32px);
    background: #0D0D12;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(212,168,67,.1);
    position: relative;
  }
  @media (max-width: 430px) {
    body { padding: 0; align-items: stretch; justify-content: stretch; background: #0D0D12; }
    .phone { width: 100%; height: 100vh; max-height: none; border-radius: 0; box-shadow: none; }
  }

  .cc-scroll::-webkit-scrollbar { display: none; }

  @keyframes ccPop {
    0% { opacity: 0; transform: translateY(8px) scale(.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  #root { width: 100%; height: 100%; }

  /* Bootstrap fallback while scripts load */
  .boot {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px; color: #7A7875;
    font-size: .7rem; letter-spacing: .14em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="phone">
  <div id="root">
    <div class="boot">
      <img src="./assets/logo.svg" width="56" height="56">
      <span>Загрузка…</span>
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./Icons.jsx"></script>
<script type="text/babel" src="./Coin.jsx"></script>
<script type="text/babel" src="./Chip.jsx"></script>
<script type="text/babel" src="./BalanceHero.jsx"></script>
<script type="text/babel" src="./QuickPlayTiles.jsx"></script>
<script type="text/babel" src="./ListRow.jsx"></script>
<script type="text/babel" src="./PassportCard.jsx"></script>
<script type="text/babel" src="./ModeTiles.jsx"></script>
<script type="text/babel" src="./ChessBoard.jsx"></script>
<script type="text/babel" src="./PlayerBar.jsx"></script>
<script type="text/babel" src="./BottomNav.jsx"></script>
<script type="text/babel" src="./HomeScreen.jsx"></script>
<script type="text/babel" src="./OtherScreens.jsx"></script>
<script type="text/babel" src="./App.jsx"></script>
<script type="text/babel">
  // Wait for all Babel scripts to finish, then mount.
  const mount = () => {
    if (!window.App) { setTimeout(mount, 40); return; }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  };
  mount();
</script>
</body>
</html>
