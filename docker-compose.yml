version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chesscoin_postgres
    restart: always
    environment:
      POSTGRES_DB: chesscoin
      POSTGRES_USER: chesscoin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chesscoin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chesscoin_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru --notify-keyspace-events Kx --save "" --appendonly no
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Stockfish встроен через npm) ─
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chesscoin_backend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"    # M2: ротация логов — максимум 50MB на файл
        max-file: "5"      # хранить 5 файлов = до 250MB
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      SERVER_PORT: 3000
      DATABASE_URL: postgresql://chesscoin:${POSTGRES_PASSWORD}@postgres:5432/chesscoin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_API_SECRET: ${BOT_API_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: https://${DOMAIN}
      ADMIN_IDS: ${ADMIN_IDS}
      # Stockfish встроен в npm пакет — отдельный контейнер не нужен
      MAX_ATTEMPTS: 3
      ATTEMPT_PRICE: 1000
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-ru-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      SCREENSHOT_SECRET: ${SCREENSHOT_SECRET}
      PLATFORM_TON_WALLET: ${PLATFORM_TON_WALLET}
      # OPT-10: Worker pool size (настраивать под CPU)
      STOCKFISH_POOL_SIZE: ${STOCKFISH_POOL_SIZE:-20}
      # OPT-10: Node.js heap limit (предотвращает OOM)
      NODE_OPTIONS: "--max-old-space-size=1024"
    # OPT-10: Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.8'
          memory: 1500M
        reservations:
          cpus: '0.5'
          memory: 512M
      TONCENTER_API_KEY: ${TONCENTER_API_KEY}
      TON_NETWORK: ${TON_NETWORK:-mainnet}
      DOMAIN: ${DOMAIN}
    expose:
      - "3000"
    networks:
      - app-network

  # ─── Frontend ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chesscoin_frontend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3" 
    expose:
      - "80"
    networks:
      - app-network

  # ─── Telegram Bot ────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: chesscoin_bot
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3" 
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_API_SECRET: ${BOT_API_SECRET}
      BACKEND_URL: http://backend:3000/api/v1
      WEBAPP_URL: https://${DOMAIN}
      BOT_USERNAME: chessgamecoin_bot
      ADMIN_IDS: ${ADMIN_IDS}
      # Webhook (production) — раскомментировать после настройки SSL
      WEBHOOK_URL: ${BOT_WEBHOOK_URL:-}   # если пусто — polling mode
      BOT_WEBHOOK_SECRET: ${BOT_WEBHOOK_SECRET:-chesscoin_wh_secret}
      BOT_PORT: 8080
    expose:
      - "8080"
    depends_on:
      - backend
    networks:
      - app-network

  # ─── Nginx ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: chesscoin_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/chesscoin.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
