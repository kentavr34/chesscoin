# ─── ChessCoin nginx конфиг v7.1.2 ───────────────────────────────────────────

# Редирект HTTP → HTTPS
server {
    listen 80;
    server_name chesscoin.app www.chesscoin.app;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://chesscoin.app$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name chesscoin.app www.chesscoin.app;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/chesscoin.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chesscoin.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    # Security headers
    # X-Frame-Options НЕТ — блокирует Telegram Mini App
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/wasm image/svg+xml font/woff2;

    # ─── Docker DNS resolver — re-resolve on each request (prevents 502 after redeploy)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ─── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
        set $backend "http://backend:3000";
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  15s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        client_max_body_size 5m;
    }

    # ─── Health check ─────────────────────────────────────────────────────────
    location /health {
        set $backend "http://backend:3000";
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    # ─── Socket.io (WebSocket) ────────────────────────────────────────────────
    location /socket.io/ {
        set $backend "http://backend:3000";
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket — длинный таймаут
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # Отключаем буферизацию для realtime
        proxy_buffering off;
    }

    # ─── Bot webhook ──────────────────────────────────────────────────────────
    location /bot/webhook {
        set $bot "http://bot:8080";
        proxy_pass         $bot;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # Только POST от Telegram
        limit_except POST { deny all; }
    }

    # ─── Статика Vite (хеш в имени → вечный кеш) ──────────────────────────────
    location ~* ^/assets/.*\.(js|css|woff2?|png|jpg|svg|ico)$ {
        set $frontend "http://frontend:80";
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        # Vite добавляет хеш в имя файла → файл никогда не меняется
        add_header         Cache-Control "public, max-age=31536000, immutable" always;
        access_log         off;
    }

    # ─── Frontend (React SPA) ─────────────────────────────────────────────────
    location / {
        set $frontend "http://frontend:80";
        proxy_pass         $frontend;
        proxy_hide_header  Cache-Control;
        # index.html НЕ кешируем (проверяем наличие новой версии)
        add_header         Cache-Control "no-cache, must-revalidate" always;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
