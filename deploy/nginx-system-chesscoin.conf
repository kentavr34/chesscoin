# HTTP → HTTPS redirect
server {
    if ($host = www.chesscoin.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = chesscoin.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name chesscoin.app www.chesscoin.app;
    return 301 https://chesscoin.app$request_uri;




}

# HTTPS — проксируем на Chesscoin nginx (8443)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chesscoin.app www.chesscoin.app;
    ssl_certificate /etc/letsencrypt/live/chesscoin.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/chesscoin.app/privkey.pem; # managed by Certbot
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5;

    # WebSocket upgrade map отсутствует — используем прямые заголовки.
    # ВАЖНО: socket.io работает в websocket-only режиме (backend OPT-3),
    # поэтому без Upgrade/Connection заголовков игра пишет «нет связи».
    location /socket.io/ {
        proxy_pass https://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_verify off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /static/avatars/ {
        alias /opt/chesscoin/avatars/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        proxy_pass https://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_verify off;
    }


}
