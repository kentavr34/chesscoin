name: Deploy to Production

on:
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 2222 }}
          script: |
            set -e
            cd /opt/chesscoin

            echo "==> Pulling branch: ${{ github.ref_name }}..."
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            echo "==> Building and restarting containers..."
            docker compose up -d --build backend frontend bot

            echo "==> Resolving any previously failed migrations..."
            docker exec chesscoin_backend npx prisma migrate resolve --rolled-back 20260313_tournaments_streak 2>/dev/null || true

            echo "==> Running DB migrations..."
            docker exec chesscoin_backend npx prisma migrate deploy

            echo "==> Running seed (update shop item images)..."
            docker exec chesscoin_backend npm run seed

            echo "==> Health check..."
            sleep 5
            docker exec chesscoin_backend node -e "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',e=>{console.error(e.message);process.exit(1)})" || (echo "Health check failed! Backend logs:" && docker logs --tail 80 chesscoin_backend && exit 1)

            echo "==> Waiting 30s to check backend stability..."
            sleep 30
            echo "==> Post-deploy container status..."
            docker inspect chesscoin_backend --format '{{.State.Status}} restarts={{.RestartCount}}' || true
            docker logs --tail 30 chesscoin_backend 2>&1 | tail -30 || true

            echo "==> Checking public API health..."
            curl -sf https://chesscoin.app/health && echo "Public health OK" || echo "WARNING: Public health returned non-200"

            echo "==> Deploy complete! Branch: ${{ github.ref_name }}"
