# CI (U2) → при успехе деплой на VPS. PR: только проверки, без деплоя.
name: CI and Deploy ChessCoin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: chesscoin-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-backend:
    name: ✅ Backend — test + tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test -- --testPathIgnorePatterns='(referral|cleanup|session|finish).test.ts'
      - run: npx tsc --noEmit

  verify-frontend:
    name: ✅ Frontend — vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck

  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: [verify-backend, verify-frontend]
    if: github.event_name != 'pull_request'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 300s
          script: |
            set -e
            cd /opt/chesscoin
            git pull origin main
            docker compose up -d --build --remove-orphans
            sleep 15
            docker compose exec -T backend npx prisma migrate deploy
            for i in {1..10}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://chesscoin.app/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Health check passed (attempt $i)"
                break
              fi
              sleep 5
              if [ $i -eq 10 ]; then
                docker compose logs backend --tail=30
                exit 1
              fi
            done
            docker compose ps
            echo "✅ Deploy completed!"

  notify:
    name: 📱 Telegram Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.event_name != 'pull_request'
    continue-on-error: true

    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ ChessCoin задеплоен
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ ChessCoin деплой ПРОВАЛИЛСЯ
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}
