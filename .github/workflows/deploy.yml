name: Deploy to VPS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Backend tests
        run: |
          cd backend
          npm ci
          npx prisma generate
          npm test
          
      - name: Frontend build test
        run: |
          cd frontend
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          
      - name: Create .env on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /opt/chesscoin || exit 1
            
            # Create .env file safely
            cat > .env << 'EOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DATABASE_URL=postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/chesscoin
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            BOT_API_SECRET=${{ secrets.BOT_API_SECRET }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            ADMIN_IDS=${{ secrets.ADMIN_IDS }}
            DOMAIN=${{ secrets.DOMAIN }}
            PLATFORM_TON_WALLET=${{ secrets.PLATFORM_TON_WALLET }}
            TONCENTER_API_KEY=${{ secrets.TONCENTER_API_KEY }}
            S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
            S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
            NODE_ENV=production
            EOF
            
            echo '.env file created successfully'
          "
          
      - name: Deploy with Docker Compose
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /opt/chesscoin || exit 1
            
            # Pull latest changes
            git pull origin main
            
            # Rebuild and restart containers
            docker compose down
            docker compose up -d --build
            
            # Wait for DB to be ready
            sleep 10
            
            # Run migrations
            docker compose exec -T backend npx prisma migrate deploy || echo 'Migrations may have failed, check logs'
            
            # Seed database (if needed)
            docker compose exec -T backend npx tsx prisma/seed.ts || echo 'Seeding may have failed, check logs'
            
            # Restart bot
            docker compose restart bot
            
            echo '✅ Deployment completed!'
          "
          
      - name: Health check
        run: |
          sleep 5
          curl -f https://${{ secrets.DOMAIN }}/health || echo '⚠️ Health check failed, check logs'
          
      - name: Show logs on failure
        if: failure()
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /opt/chesscoin
            docker compose logs --tail=50
          "
