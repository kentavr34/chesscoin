name: Deploy to VPS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend build test
        run: |
          cd frontend
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy with Docker Compose
        run: |
          ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd /opt/chesscoin || exit 1

            # Pull latest changes
            git pull origin main

            # Rebuild and restart containers
            docker compose up -d --build --no-deps frontend nginx
            docker compose up -d --build --no-deps backend bot

            echo '✅ Deployment completed!'
          "

      - name: Health check
        run: |
          sleep 10
          curl -f https://chesscoin.app/health || echo '⚠️ Health check failed, check logs'

      - name: Show logs on failure
        if: failure()
        run: |
          ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd /opt/chesscoin
            docker compose logs --tail=50
          " || echo 'Could not fetch logs'
