# ──────────────────────────────────────────────────────────────
# ChessCoin — CI/CD Pipeline
#
# Триггер: push в ветку main
#
# Шаги:
# 1. Тесты (124 unit тестов)
# 2. TypeScript проверка (tsc --noEmit)
# 3. SSH деплой на VPS:
#    - git pull
#    - docker compose up --build -d
#    - prisma migrate deploy
#    - health check
#
# Секреты GitHub (Settings → Secrets → Actions):
#   SSH_HOST         — IP адрес VPS
#   SSH_USER         — пользователь (обычно root или ubuntu)
#   SSH_PRIVATE_KEY  — приватный SSH ключ (весь текст с -----BEGIN...)
#   SSH_PORT         — порт SSH (обычно 22)
# ──────────────────────────────────────────────────────────────

name: Deploy ChessCoin

on:
  push:
    branches: [main]
  workflow_dispatch:      # ручной запуск из GitHub UI

jobs:
  # ── Шаг 1: Тесты и типизация ─────────────────────────────────
  test:
    name: 🧪 Tests & TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run unit tests (124 tests)
        working-directory: backend
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test

      # - name: TypeScript check (backend)
      #   working-directory: backend
      #   run: npx tsc --noEmit

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # - name: TypeScript check (frontend)
      #   working-directory: frontend
      #   run: npx tsc --noEmit

  # ── Шаг 2: Деплой на VPS ──────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: test             # запускается только если тесты прошли
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 300s
          script: |
            set -e
            echo "──────────────────────────────────"
            echo "🚀 ChessCoin Deploy $(date '+%Y-%m-%d %H:%M:%S')"
            echo "──────────────────────────────────"

            cd /opt/chesscoin

            # Получаем последние изменения
            echo "📥 Git pull..."
            git pull origin main

            # Пересобираем и перезапускаем контейнеры
            echo "🐳 Docker compose build & up..."
            docker compose up -d --build --remove-orphans

            # Ждём запуска backend
            echo "⏳ Waiting for backend..."
            sleep 10

            # Применяем миграции БД
            echo "🗄️  Prisma migrate deploy..."
            docker compose exec -T backend npx prisma migrate deploy

            # Health check
            echo "❤️  Health check..."
            for i in {1..10}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://chesscoin.app/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Health check passed (attempt $i)"
                break
              fi
              echo "⏳ Attempt $i: status=$STATUS, waiting 5s..."
              sleep 5
              if [ $i -eq 10 ]; then
                echo "❌ Health check failed after 10 attempts"
                docker compose logs backend --tail=30
                exit 1
              fi
            done

            # Показываем статус
            echo "📊 Container status:"
            docker compose ps

            echo ""
            echo "✅ Deploy completed successfully!"

  # ── Уведомление в Telegram при успехе/ошибке ─────────────────
  notify:
    name: 📱 Telegram Notification
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()

    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *ChessCoin v7.1+ задеплоен успешно!*

            📦 Коммит: `${{ github.sha }}`
            👤 Автор: ${{ github.actor }}
            🕐 Время: ${{ github.event.head_commit.timestamp }}

            [Открыть приложение](https://chesscoin.app)

      - name: Notify failure
        if: needs.test.result == 'failure' || needs.deploy.result == 'failure'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *ChessCoin деплой ПРОВАЛИЛСЯ*

            📦 Коммит: `${{ github.sha }}`
            👤 Автор: ${{ github.actor }}
            🔴 Тесты: ${{ needs.test.result }}
            🔴 Деплой: ${{ needs.deploy.result }}

            [Логи GitHub Actions](https://github.com/${{ github.repository }}/actions)
